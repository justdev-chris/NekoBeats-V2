name: Build BeatFlash Plugin
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Compile plugin
        run: |
          $csc = "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe"
          & $csc /target:library /reference:"C:\Windows\Microsoft.NET\Framework64\v4.0.30319\System.Windows.Forms.dll" /reference:"C:\Windows\Microsoft.NET\Framework64\v4.0.30319\System.Drawing.dll" /out:BeatFlashPlugin.dll PluginSystem/PluginInterface.cs BeatFlashPlugin.cs
      
      - name: Rename to .nbplugin
        run: ren BeatFlashPlugin.dll BeatFlashPlugin.nbplugin
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeatFlashPlugin
          path: BeatFlashPlugin.nbplugin
