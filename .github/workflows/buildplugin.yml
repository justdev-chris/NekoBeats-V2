name: Build BeatFlash Plugin
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      
      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2
      
      - name: Create plugin project
        run: |
          @"
          <Project Sdk=`"Microsoft.NET.Sdk`">
            <PropertyGroup>
              <TargetFramework>net472</TargetFramework>
              <OutputType>Library</OutputType>
              <AssemblyName>BeatFlashPlugin</AssemblyName>
              <EnableDefaultCompileItems>false</EnableDefaultCompileItems>
            </PropertyGroup>
            <ItemGroup>
              <Compile Include=`"BeatFlashPlugin.cs`" />
              <Reference Include=`"System.Windows.Forms`" />
              <Reference Include=`"System.Drawing`" />
              <Reference Include=`"NekoBeats`">
                <HintPath>NekoBeats.exe</HintPath>
              </Reference>
            </ItemGroup>
          </Project>
          "@ > BeatFlashPlugin.csproj
      
      - name: Create source file
        run: |
          @"
          using System;
          using System.Drawing;
          using System.Windows.Forms;
          using NekoBeats.Plugins;

          namespace BeatFlashPlugin
          {
              public class BeatFlashPlugin : INekoBeatsPlugin
              {
                  public string Name => "Beat Flash";
                  public string Version => "1.0";
                  public string Author => "justdev-chris";

                  private INekoBeatsHost host;
                  private System.Threading.Timer timer;
                  private float lastAudioLevel = 0;
                  private bool flashing = false;
                  private int flashHeight = 120;
                  private TrackBar heightTrack;

                  public void OnLoad(INekoBeatsHost host)
                  {
                      this.host = host;

                      host.AddControlPanelTab("FLASH", panel =>
                      {
                          var label = new Label
                          {
                              Text = "Beat Flash Settings",
                              Location = new Point(20, 20),
                              Size = new Size(300, 25),
                              ForeColor = Color.FromArgb(0, 255, 200),
                              Font = new Font("Courier New", 10, FontStyle.Bold)
                          };
                          panel.Controls.Add(label);

                          var heightLabel = new Label
                          {
                              Text = $"Flash Height: {flashHeight}",
                              Location = new Point(20, 60),
                              Size = new Size(200, 20),
                              ForeColor = Color.White,
                              Font = new Font("Courier New", 9)
                          };
                          panel.Controls.Add(heightLabel);

                          heightTrack = new TrackBar
                          {
                              Location = new Point(20, 85),
                              Size = new Size(400, 40),
                              Minimum = 80,
                              Maximum = 200,
                              Value = flashHeight,
                              TickStyle = TickStyle.None,
                              BackColor = Color.FromArgb(20, 20, 30)
                          };
                          heightTrack.ValueChanged += (s, e) =>
                          {
                              flashHeight = heightTrack.Value;
                              heightLabel.Text = $"Flash Height: {flashHeight}";
                          };
                          panel.Controls.Add(heightTrack);
                      });

                      host.Log("Beat Flash loaded!");
                  }

                  public void OnEnable()
                  {
                      timer = new System.Threading.Timer(_ =>
                      {
                          float level = host.GetAudioLevel();

                          if (level > lastAudioLevel + 0.15f && !flashing)
                          {
                              flashing = true;
                              host.SetOpacity(1.0f);
                              host.SetBarHeight(flashHeight);
                          }
                          else if (flashing)
                          {
                              host.SetOpacity(0.75f);
                              host.SetBarHeight(80);
                              flashing = false;
                          }

                          lastAudioLevel = level;
                      }, null, 0, 30);
                  }

                  public void OnDisable()
                  {
                      timer?.Dispose();
                      host.SetOpacity(1.0f);
                      host.SetBarHeight(80);
                  }

                  public void OnUnload()
                  {
                      timer?.Dispose();
                  }
              }
          }
          "@ > BeatFlashPlugin.cs
      
      - name: Download NekoBeats.exe
        run: |
          curl -L -o NekoBeats.exe "https://github.com/justdev-chris/NekoBeats-V2/releases/latest/download/NekoBeats.exe"
      
      - name: Restore NuGet packages
        run: nuget restore BeatFlashPlugin.csproj
      
      - name: Build plugin
        run: msbuild BeatFlashPlugin.csproj /p:Configuration=Release /p:OutputPath=.
      
      - name: Rename to .nbplugin
        run: ren BeatFlashPlugin.dll BeatFlashPlugin.nbplugin
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeatFlashPlugin
          path: BeatFlashPlugin.nbplugin
