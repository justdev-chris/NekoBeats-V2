          EOF
      
      - name: Run translation generator
        run: |
          cd TranslationTool/TranslationTool
          dotnet run
      
      - name: List generated files
        run: |
          echo "Generated translation files:"
          ls -la lang/
      
      - name: Upload translations
        uses: actions/upload-artifact@v4
        with:
          name: translations
          path: lang/*.json
      
      - name: Create PR with translations
        uses: peter-evans/create-pull-request@v6
        with:
          title: "Add translations for v2.3.4"
          body: "Auto-generated translations from MyMemory API"
          commit-message: "Add translations for all languages"
          branch: "translations"
          add-paths: |
            lang/*.json
